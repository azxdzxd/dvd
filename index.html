<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bouncing DVD Logo with Corner Countdown</title>
  <style>
    body { margin: 0; background: black; overflow: hidden; }
    #dvd {
      position: absolute;
      width: 320px;  /* 1/6 of 1920 */
      height: 128px; /* aspect ratio ~2.5:1 */
      background: purple;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #timer {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 20px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="dvd">DVD</div>
  <div id="timer">Next corner hit in: calculating…</div>

  <script>
    const dvd = document.getElementById("dvd");
    const timer = document.getElementById("timer");

    let x = 100, y = 100;
    let vx = 3, vy = 3;
    const width = dvd.offsetWidth;
    const height = dvd.offsetHeight;

    function timeToNextCorner() {
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      // Time to next vertical wall
      let tx = vx > 0 ? (screenW - width - x) / vx : (0 - x) / vx;
      // Time to next horizontal wall
      let ty = vy > 0 ? (screenH - height - y) / vy : (0 - y) / vy;

      // A corner hit occurs when both times are equal (within tolerance)
      const tolerance = 0.1;
      if (Math.abs(tx - ty) < tolerance && tx > 0 && ty > 0) {
        return Math.max(tx, ty);
      }
      return null; // no corner hit in current trajectory
    }

    function updateTimer() {
      const t = timeToNextCorner();
      if (t !== null) {
        timer.textContent = `Next corner hit in: ${t.toFixed(1)}s`;
      } else {
        timer.textContent = "Next corner hit in: not on path";
      }
    }

    function animate() {
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      x += vx;
      y += vy;

      if (x <= 0 || x + width >= screenW) vx *= -1;
      if (y <= 0 || y + height >= screenH) vy *= -1;

      dvd.style.left = x + "px";
      dvd.style.top = y + "px";

      updateTimer();
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
